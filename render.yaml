services:
  - type: web
    name: prayerpowernetwork
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn prayerpower.wsgi:application
    envVars:
      - key: SECRET_KEY
        sync: false   # You'll set this manually in Render dashboard
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "prayerpowernetwork.onrender.com"